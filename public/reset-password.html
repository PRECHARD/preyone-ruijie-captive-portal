<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Preyone UltraNet Wi‑Fi</title>
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Preyone" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/portal.css" />
  <link rel="stylesheet" href="/css/account.css" />
</head>
<body class="portal-body">
  <div class="body-loading hidden" id="bodyLoading">
    <div class="loading-spinner">
      <div class="loading-spinner-inner">
        <img src="/images/faviconloading.svg" alt="Preyone" />
      </div>
    </div>
    <div class="loading-text">Resetting password...</div>
  </div>

  <header class="portal-header">
    <div class="brand-banner">
      <picture class="brand-logo-picture">
        <source srcset="/images/preyonenoneglow-logo-zoom.png" media="(prefers-contrast: more)" />
        <img src="/images/preyonenoneglow-logo-zoom.png" alt="Preyone" class="brand-logo-img" width="400" />
      </picture>
    </div>
    <div class="brand-eyebrow">
      <span class="brand-signature">Fadaya nePreyone UltraNet Wifi</span>
    </div>
  </header>

  <main class="portal-shell">
    <div style="max-width:480px;margin:2rem auto">
      <div class="glass-card glass-card--hero">
        <div class="brand" style="margin-bottom:1.5rem">
          <h2>Set New Password</h2>
          <p class="subtitle" id="reset-subtitle">Enter a new password for your account.</p>
        </div>

        <div id="reset-invalid" class="hidden" style="text-align:center;padding:1rem">
          <p style="color:var(--orange)">This reset link is invalid or has expired.</p>
          <p style="margin-top:1rem"><a href="/forgot-password.html" style="color:var(--cyan)">Request a new reset link</a></p>
        </div>

        <form id="reset-form" class="hidden" novalidate>
          <div class="field">
            <label for="reset-password">New Password</label>
            <input id="reset-password" name="password" type="password" autocomplete="new-password" placeholder="8+ chars, upper, lower, number &amp; special" minlength="8" required />
            <span class="field-error" id="err-reset-password"></span>
          </div>
          <div class="field">
            <label for="reset-confirm">Confirm Password</label>
            <input id="reset-confirm" name="confirm" type="password" autocomplete="new-password" placeholder="Repeat your password" required />
            <span class="field-error" id="err-reset-confirm"></span>
          </div>
          <div id="reset-error" class="field-error hidden"></div>
          <div id="reset-success" class="field-success hidden">
            <p>Password reset successful!</p>
            <p style="margin-top:0.5rem"><a href="/login" style="color:var(--cyan);font-weight:700">Sign In Now</a></p>
          </div>
          <button type="submit" id="reset-submit-btn" class="account-btn">
            <span id="reset-btn-text">Reset Password</span>
            <span id="reset-btn-spinner" class="spinner hidden" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(location.search);
      var token = params.get('token');

      var invalidEl = document.getElementById('reset-invalid');
      var form = document.getElementById('reset-form');
      var subtitle = document.getElementById('reset-subtitle');
      var passwordEl = document.getElementById('reset-password');
      var confirmEl = document.getElementById('reset-confirm');
      var errorEl = document.getElementById('reset-error');
      var successEl = document.getElementById('reset-success');
      var btn = document.getElementById('reset-submit-btn');
      var btnText = document.getElementById('reset-btn-text');
      var btnSpinner = document.getElementById('reset-btn-spinner');
      var loadingEl = document.getElementById('bodyLoading');

      function setFieldError(field, msg) {
        var el = document.getElementById('err-' + field);
        if (el) { el.textContent = msg; el.classList.toggle('visible', !!msg); }
        var input = document.getElementById(field);
        if (input) input.classList.toggle('invalid', !!msg);
      }

      // Validate token on load
      if (!token) {
        invalidEl.classList.remove('hidden');
        subtitle.textContent = '';
        return;
      }

      fetch('/api/auth/verify-reset-token?token=' + encodeURIComponent(token))
        .then(function (r) { return r.json(); })
        .then(function (json) {
          if (!json.valid) {
            invalidEl.classList.remove('hidden');
            subtitle.textContent = '';
            return;
          }
          subtitle.textContent = 'Hi ' + json.fullName + ', enter your new password.';
          form.classList.remove('hidden');
        })
        .catch(function () {
          invalidEl.classList.remove('hidden');
          subtitle.textContent = '';
        });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var password = passwordEl.value;
        var confirm = confirmEl.value;

        setFieldError('reset-password', '');
        setFieldError('reset-confirm', '');

        var pwRe = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]).{8,}$/;
        if (!password) { setFieldError('reset-password', 'Password is required.'); return; }
        if (!pwRe.test(password)) { setFieldError('reset-password', 'Must be 8+ chars with uppercase, lowercase, number & special character.'); return; }
        if (password !== confirm) { setFieldError('reset-confirm', 'Passwords do not match.'); return; }

        btn.disabled = true;
        btnText.textContent = 'Resetting\u2026';
        btnSpinner.classList.remove('hidden');
        if (loadingEl) loadingEl.classList.remove('hidden');
        if (errorEl) { errorEl.textContent = ''; errorEl.classList.add('hidden'); }

        try {
          var res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, password: password }),
          });
          var json = await res.json();
          if (!res.ok) {
            if (errorEl) { errorEl.textContent = json.error || 'Reset failed.'; errorEl.classList.remove('hidden'); }
            return;
          }
          form.querySelector('button').style.display = 'none';
          if (successEl) successEl.classList.remove('hidden');
        } catch (_err) {
          if (errorEl) { errorEl.textContent = 'Network error \u2014 check your connection.'; errorEl.classList.remove('hidden'); }
        } finally {
          btn.disabled = false;
          btnText.textContent = 'Reset Password';
          btnSpinner.classList.add('hidden');
          if (loadingEl) loadingEl.classList.add('hidden');
        }
      });
    });
  </script>
</body>
</html>
