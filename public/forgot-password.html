<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Preyone UltraNet Wi‑Fi</title>
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Preyone" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/portal.css" />
  <link rel="stylesheet" href="/css/account.css" />
</head>
<body class="portal-body">
  <div class="body-loading hidden" id="bodyLoading">
    <div class="loading-spinner">
      <div class="loading-spinner-inner">
        <img src="/images/faviconloading.svg" alt="Preyone" />
      </div>
    </div>
    <div class="loading-text">Sending...</div>
  </div>

  <header class="portal-header">
    <div class="brand-banner">
      <picture class="brand-logo-picture">
        <source srcset="/images/preyonenoneglow-logo-zoom.png" media="(prefers-contrast: more)" />
        <img src="/images/preyonenoneglow-logo-zoom.png" alt="Preyone" class="brand-logo-img" width="400" />
      </picture>
    </div>
    <div class="brand-eyebrow">
      <span class="brand-signature">Fadaya nePreyone UltraNet Wifi</span>
    </div>
  </header>

  <main class="portal-shell">
    <div style="max-width:480px;margin:2rem auto">
      <div class="glass-card glass-card--hero">
        <div class="brand" style="margin-bottom:1.5rem">
          <h2>Forgot Password</h2>
          <p class="subtitle">Enter the email you used when signing up. We'll send you a reset link.</p>
        </div>

        <form id="forgot-form" novalidate>
          <div class="field">
            <label for="forgot-email">Email</label>
            <input id="forgot-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
            <span class="field-error" id="err-forgot-email"></span>
          </div>
          <div id="forgot-error" class="field-error hidden"></div>
          <div id="forgot-success" class="field-success hidden">
            <p>If that email is registered, a reset link has been sent. Check your inbox (and spam folder).</p>
          </div>
          <button type="submit" id="forgot-submit-btn" class="account-btn">
            <span id="forgot-btn-text">Send Reset Link</span>
            <span id="forgot-btn-spinner" class="spinner hidden" aria-hidden="true"></span>
          </button>
        </form>

        <p style="text-align:center;font-size:0.8rem;color:var(--text-muted);margin-top:1.5rem">
          <a href="/login" style="color:var(--cyan)">Back to Sign In</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var form = document.getElementById('forgot-form');
      var emailInput = document.getElementById('forgot-email');
      var errorEl = document.getElementById('forgot-error');
      var successEl = document.getElementById('forgot-success');
      var btn = document.getElementById('forgot-submit-btn');
      var btnText = document.getElementById('forgot-btn-text');
      var btnSpinner = document.getElementById('forgot-btn-spinner');
      var loadingEl = document.getElementById('bodyLoading');

      function setFieldError(field, msg) {
        var el = document.getElementById('err-' + field);
        if (el) { el.textContent = msg; el.classList.toggle('visible', !!msg); }
        var input = document.getElementById(field);
        if (input) input.classList.toggle('invalid', !!msg);
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var email = emailInput.value.trim();
        if (!email) { setFieldError('forgot-email', 'Email is required.'); return; }

        btn.disabled = true;
        btnText.textContent = 'Sending\u2026';
        btnSpinner.classList.remove('hidden');
        if (loadingEl) loadingEl.classList.remove('hidden');
        if (errorEl) { errorEl.textContent = ''; errorEl.classList.add('hidden'); }
        if (successEl) successEl.classList.add('hidden');

        try {
          var res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          var json = await res.json();
          if (!res.ok) {
            if (errorEl) { errorEl.textContent = json.error || 'Something went wrong.'; errorEl.classList.remove('hidden'); }
            return;
          }
          if (successEl) successEl.classList.remove('hidden');
          form.querySelector('button').style.display = 'none';
        } catch (_err) {
          if (errorEl) { errorEl.textContent = 'Network error — check your connection.'; errorEl.classList.remove('hidden'); }
        } finally {
          btn.disabled = false;
          btnText.textContent = 'Send Reset Link';
          btnSpinner.classList.add('hidden');
          if (loadingEl) loadingEl.classList.add('hidden');
        }
      });
    });
  </script>
</body>
</html>
