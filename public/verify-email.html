<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified — Preyone UltraNet Wi‑Fi</title>
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Preyone" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/portal.css" />
</head>
<body class="portal-body">
  <header class="portal-header">
    <div class="brand-banner">
      <picture class="brand-logo-picture">
        <source srcset="/images/preyonenoneglow-logo-zoom.png" media="(prefers-contrast: more)" />
        <img src="/images/preyonenoneglow-logo-zoom.png" alt="Preyone" class="brand-logo-img" width="400" />
      </picture>
    </div>
  </header>
  <main class="portal-shell">
    <div style="max-width:480px;margin:4rem auto">
      <div class="glass-card glass-card--hero" style="text-align:center;padding:3rem">
        <div id="verify-success" class="hidden">
          <h2 style="color:#25D366">Email Verified</h2>
          <p style="margin-top:1rem;color:var(--text-muted)">Your email has been confirmed. You can now sign in to manage your account.</p>
          <a href="https://admin.preyone.com" class="btn-primary" style="display:inline-block;margin-top:1.5rem">Sign In</a>
        </div>
        <div id="verify-failed" class="hidden">
          <h2 style="color:var(--orange)">Verification Failed</h2>
          <p style="margin-top:1rem;color:var(--text-muted)">The verification link is invalid or has expired.</p>
          <p style="margin-top:1rem;font-size:0.8rem;color:var(--text-muted)">Try signing in to request a new verification email.</p>
          <a href="https://admin.preyone.com" class="btn-secondary" style="display:inline-block;margin-top:1.5rem">Sign In</a>
        </div>
      </div>
    </div>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(location.search);
      if (params.get('status') === 'verified') {
        document.getElementById('verify-success').classList.remove('hidden');
      } else {
        document.getElementById('verify-failed').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
