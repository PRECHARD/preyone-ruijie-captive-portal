# Preyone Captive Portal — nginx reverse proxy config
# Place in /etc/nginx/sites-available/preyone and symlink to sites-enabled
# Run: sudo nginx -t && sudo systemctl reload nginx

# Main site — preyone.com
server {
    listen 80;
    server_name preyone.com www.preyone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name preyone.com www.preyone.com;

    ssl_certificate     /etc/letsencrypt/live/preyone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/preyone.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Captive portal — wifi.preyone.com
server {
    listen 80;
    server_name wifi.preyone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wifi.preyone.com;

    ssl_certificate     /etc/letsencrypt/live/wifi.preyone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wifi.preyone.com/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Admin console — admin.preyone.com
